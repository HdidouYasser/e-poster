server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:eposter}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQL_USER:aymane}
    password: ${MYSQL_PASSWORD:}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  sql:
    init:
      mode: always
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  security:
    jwt-secret: ${JWT_SECRET:7ef0f1aeac8fe354cb09e933cfe2201faeb292987b35940d3094848a04789f00}
    jwt-expiration-ms: 86400000
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
  files:
    storage-dir: ${FILES_STORAGE_DIR:uploads}
